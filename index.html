<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本充電站｜14天日本旅行日文挑戰</title>
<style>
:root{--pink:#e85778;--coral:#ef7767;--teal:#2f7f7b;--ink:#20363c;--muted:#6e7f84;--line:#e8eceb;--soft:#f5f8f7}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#fff8f4,#f4fbfa)}
.wrap{width:min(1100px,92%);margin:auto}.hero{padding:40px 0}.hero-box{padding:50px;border-radius:32px;color:#fff;background:linear-gradient(120deg,var(--coral),#d99189 48%,var(--teal));box-shadow:0 18px 50px rgba(32,54,60,.15)}
h1{font-size:clamp(42px,7vw,76px);margin:10px 0}.hero p{font-size:20px;line-height:1.7}.btn{border:0;border-radius:999px;padding:13px 20px;font-weight:800;cursor:pointer;background:var(--pink);color:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:0 10px 35px rgba(32,54,60,.08)}.dashboard{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;margin-top:18px}
.mascot{display:flex;gap:16px;align-items:center}.face{width:76px;height:76px;border-radius:22px;display:grid;place-items:center;font-size:42px;background:#fff0c9}
.progress{height:14px;background:#edf1f0;border-radius:999px;overflow:hidden}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,#f2c15d,var(--coral));transition:.3s}
section{padding:30px 0}.head{display:flex;justify-content:space-between;align-items:end;margin-bottom:18px}.head h2{font-size:36px;margin:0}.muted{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:22px;display:flex;flex-direction:column;min-height:220px}.card h3{font-size:22px;margin:12px 0 8px}.card p{color:var(--muted);line-height:1.6}.card .btn{margin-top:auto;width:100%}.status{font-size:12px;padding:6px 10px;border-radius:999px;background:var(--soft)}.done{background:#def4ea;color:#21845f}
dialog{border:0;border-radius:26px;padding:0;width:min(760px,94vw);max-height:90vh}dialog::backdrop{background:rgba(20,38,43,.65)}.lesson{padding:25px;background:#fff}.lesson-head{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:15px}.close{border:1px solid var(--line);background:#fff;border-radius:50%;width:40px;height:40px;font-size:20px}
.tabs{display:flex;gap:8px;padding:16px 0}.tab{padding:8px 12px;border-radius:999px;background:var(--soft);font-weight:800}.tab.active{background:var(--teal);color:#fff}
.phrase{text-align:center;border:1px solid var(--line);border-radius:22px;padding:28px;background:#fcfefd}.jp{font-size:48px;font-weight:900}.kana{font-size:22px;color:var(--teal);font-weight:800}.speak{width:64px;height:64px;border:0;border-radius:50%;font-size:28px;background:#e7f4f2}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.option{padding:16px;border:2px solid var(--line);border-radius:16px;background:#fff;font-weight:800}.correct{border-color:#24966f;background:#eaf8f2}.wrong{border-color:#d9534f;background:#fff0f0}
.actions{display:flex;justify-content:space-between;margin-top:18px}.badge{font-size:60px}.features{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.feature{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:20px}
footer{text-align:center;padding:40px;color:var(--muted)}
@media(max-width:800px){.dashboard{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}.features{grid-template-columns:1fr 1fr}.hero-box{padding:35px 24px}}
@media(max-width:540px){.grid,.features{grid-template-columns:1fr}.jp{font-size:36px}.options{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<section class="hero"><div class="wrap">
<div class="hero-box">
<div style="font-weight:900;letter-spacing:.2em">NIHONGO POWER</div>
<h1>日本充電站</h1>
<p>14天日本旅行日文挑戰。每天15分鐘，跟著鼓力丸從機場、電車、飯店一路玩到祭典。</p>
<button class="btn" onclick="continueLearning()">開始今天的旅程</button>
</div>
<div class="dashboard">
<div class="panel">
<div class="mascot"><div class="face">🥁</div><div><small style="color:var(--pink);font-weight:900">鼓力丸・旅行夥伴</small><h2 id="welcome">準備出發！</h2><div class="muted" id="welcomeText">今天一起完成第一站。</div></div></div>
<div style="display:flex;justify-content:space-between;margin:18px 0 8px;font-weight:800"><span>14天總進度</span><span id="progressText">0 / 14</span></div>
<div class="progress"><i id="progressBar"></i></div>
</div>
<div class="panel"><h3>今日充電語</h3><p style="font-size:24px;font-weight:900">今日の一歩が、未来を変える。</p><p class="muted">今天的一小步，會改變未來。</p></div>
</div>
</div></section>

<section><div class="wrap">
<div class="head"><div><div style="color:var(--coral);font-weight:900">YOUR JOURNEY</div><h2>日本夢啟程</h2></div><div class="muted">完成每天課程，解鎖下一段旅程。</div></div>
<div class="grid" id="dayGrid"></div>
</div></section>

<section><div class="wrap"><div class="head"><h2>學習方式</h2></div>
<div class="features">
<div class="feature">🎧<h3>先聽再說</h3><p class="muted">使用瀏覽器日文語音。</p></div>
<div class="feature">🗾<h3>旅行情境</h3><p class="muted">用實際場景記住句子。</p></div>
<div class="feature">🎮<h3>即時測驗</h3><p class="muted">每堂課都有小測驗。</p></div>
<div class="feature">💾<h3>自動保存</h3><p class="muted">進度保存在你的裝置。</p></div>
</div></div></section>
</main>
<footer>日本充電站 V1.0｜每天15分鐘，為日本夢充電。</footer>

<dialog id="lessonDialog"><div class="lesson">
<div class="lesson-head"><div><small id="lessonDay" style="color:var(--coral);font-weight:900"></small><h2 id="lessonTitle"></h2></div><button class="close" onclick="lessonDialog.close()">×</button></div>
<div class="tabs" id="tabs"></div>
<div id="lessonBody"></div>
<div class="actions"><button class="btn" style="background:#fff;color:var(--ink);border:1px solid var(--line)" onclick="prevStep()">上一步</button><button class="btn" id="nextBtn" onclick="nextStep()">下一步</button></div>
</div></dialog>

<script>
const lessons=[
["東京第一站","🗼","吃、喝、走、看、聽", [["食べる","たべる","吃"],["飲む","のむ","喝"],["歩く","あるく","走路"],["見る","みる","看"],["聞く","きく","聽"]],["「食べる」是什麼意思？",["吃","喝","看"],0]],
["抵達日本機場","✈️","入境與問路", [["こんにちは","こんにちは","你好"],["すみません","すみません","不好意思"],["どこですか","どこですか","在哪裡"],["荷物","にもつ","行李"],["出口","でぐち","出口"]],["想問「在哪裡？」要說？",["いくらですか","どこですか","だれですか"],1]],
["搭電車去東京","🚆","車票與月台", [["切符","きっぷ","車票"],["駅","えき","車站"],["何番線","なんばんせん","第幾月台"],["東京まで","とうきょうまで","到東京"],["お願いします","おねがいします","麻煩您了"]],["「車站」的日文是？",["駅","道","店"],0]],
["飯店入住","🏨","預約與入住", [["予約","よやく","預約"],["チェックイン","チェックイン","入住"],["部屋","へや","房間"],["鍵","かぎ","鑰匙"],["名前","なまえ","名字"]],["「預約」是？",["予約","部屋","鍵"],0]],
["拉麵店點餐","🍜","推薦與結帳", [["これ","これ","這個"],["一つ","ひとつ","一個"],["おすすめ","おすすめ","推薦"],["おいしい","おいしい","好吃"],["お会計","おかいけい","結帳"]],["「推薦」是？",["おすすめ","お会計","お水"],0]],
["便利商店購物","🏪","價格與付款", [["いくら","いくら","多少錢"],["袋","ふくろ","袋子"],["ください","ください","請給我"],["カード","カード","信用卡"],["現金","げんきん","現金"]],["「多少錢」是？",["いくつ","いくら","いつ"],1]],
["淺草神社參拜","⛩️","御守與拍照", [["神社","じんじゃ","神社"],["お守り","おまもり","御守"],["写真","しゃしん","照片"],["撮る","とる","拍攝"],["いいですか","いいですか","可以嗎"]],["「照片」是？",["写真","神社","地図"],0]],
["咖啡店休息","☕","冰熱與內用", [["コーヒー","コーヒー","咖啡"],["温かい","あたたかい","熱的"],["冷たい","つめたい","冰的"],["店内","てんない","內用"],["持ち帰り","もちかえり","外帶"]],["「外帶」是？",["店内","持ち帰り","入口"],1]],
["藥妝店尋寶","🛍️","尺寸與免稅", [["ありますか","ありますか","有嗎"],["大きい","おおきい","大的"],["小さい","ちいさい","小的"],["色","いろ","顏色"],["免税","めんぜい","免稅"]],["「免稅」是？",["無料","免税","割引"],1]],
["迷路時求救","🗺️","左右與直走", [["右","みぎ","右邊"],["左","ひだり","左邊"],["まっすぐ","まっすぐ","直走"],["近く","ちかく","附近"],["道","みち","路"]],["「直走」是？",["ゆっくり","まっすぐ","すぐ"],1]],
["和日本人聊天","💬","自我介紹", [["はじめまして","はじめまして","初次見面"],["台湾","たいわん","台灣"],["趣味","しゅみ","興趣"],["太鼓","たいこ","太鼓"],["すごい","すごい","好厲害"]],["「興趣」是？",["仕事","趣味","名前"],1]],
["日本祭典夜晚","🎆","祭典與煙火", [["祭り","まつり","祭典"],["花火","はなび","煙火"],["一緒に","いっしょに","一起"],["行こう","いこう","走吧"],["楽しい","たのしい","開心"]],["「煙火」是？",["花火","祭り","太鼓"],0]],
["伴手禮時間","🎁","數量與包裝", [["お土産","おみやげ","伴手禮"],["三つ","みっつ","三個"],["包む","つつむ","包裝"],["友達","ともだち","朋友"],["プレゼント","プレゼント","禮物"]],["「伴手禮」是？",["お土産","荷物","料理"],0]],
["日本夢完成日","🌸","總複習", [["ありがとう","ありがとう","謝謝"],["また来ます","またきます","還會再來"],["日本が好き","にほんがすき","喜歡日本"],["できました","できました","做到了"],["夢","ゆめ","夢想"]],["「做到了」是？",["わかりません","できました","ありません"],1]]
];
let completed=JSON.parse(localStorage.getItem("nihongoCompleted")||"[]"),day=0,step=0,word=0;
const lessonDialog=document.getElementById("lessonDialog");

function renderDays(){dayGrid.innerHTML="";lessons.forEach((l,i)=>{const done=completed.includes(i);dayGrid.innerHTML+=`<article class="card"><div style="display:flex;justify-content:space-between"><b style="color:var(--coral)">DAY ${i+1}</b><span class="status ${done?'done':''}">${done?'已完成 ✓':'未完成'}</span></div><div style="font-size:38px;margin-top:12px">${l[1]}</div><h3>${l[0]}</h3><p>${l[2]}</p><button class="btn" onclick="openLesson(${i})">${done?'再次練習':'開始課程'}</button></article>`});updateProgress()}
function updateProgress(){progressText.textContent=`${completed.length} / 14`;progressBar.style.width=(completed.length/14*100)+"%";welcome.textContent=completed.length? "歡迎回來！":"準備出發！";welcomeText.textContent=`目前完成 ${completed.length} 天。`}
function continueLearning(){let n=lessons.findIndex((_,i)=>!completed.includes(i));openLesson(n<0?13:n)}
function openLesson(i){day=i;step=0;word=0;lessonDay.textContent=`DAY ${i+1}`;lessonTitle.textContent=lessons[i][0];lessonDialog.showModal();renderLesson()}
function renderLesson(){tabs.innerHTML=["單字","情境","測驗","完成"].map((x,i)=>`<span class="tab ${i===step?'active':''}">${x}</span>`).join("");const l=lessons[day];nextBtn.style.display="inline-block";
if(step===0){const p=l[3][word];lessonBody.innerHTML=`<div class="phrase"><button class="speak" onclick="speak('${p[0]}')">🔊</button><div class="jp">${p[0]}</div><div class="kana">${p[1]}</div><p>${p[2]}</p><div><button class="btn" onclick="changeWord(-1)">上一個</button> <button class="btn" onclick="changeWord(1)">下一個</button></div></div>`;nextBtn.textContent="進入情境"}
else if(step===1){const sentence=l[3].map(x=>x[0]).join("、");lessonBody.innerHTML=`<div class="phrase"><div style="font-size:55px">${l[1]}</div><h3>今天的旅行情境</h3><p style="font-size:26px;font-weight:900">${sentence}</p><button class="btn" onclick="speak('${sentence}')">播放日文</button><p class="muted">先聽一次，再跟著念一次。</p></div>`;nextBtn.textContent="開始測驗"}
else if(step===2){const q=l[4];lessonBody.innerHTML=`<div class="phrase"><h3>${q[0]}</h3><div class="options">${q[1].map((o,i)=>`<button class="option" onclick="answer(${i},this)">${o}</button>`).join("")}</div><div id="feedback" style="margin-top:14px;font-weight:900"></div></div>`;nextBtn.style.display="none"}
else{lessonBody.innerHTML=`<div class="phrase"><div class="badge">🏆</div><h2>完成今日旅程！</h2><p class="muted">你已完成 Day ${day+1}</p><button class="btn" onclick="finishDay()">完成打卡</button></div>`;nextBtn.style.display="none"}}
function changeWord(d){word=Math.max(0,Math.min(4,word+d));renderLesson()}
function answer(i,el){const q=lessons[day][4],all=[...document.querySelectorAll(".option")];all.forEach(b=>b.disabled=true);if(i===q[2]){el.classList.add("correct");feedback.textContent="答對了！すごい！"}else{el.classList.add("wrong");all[q[2]].classList.add("correct");feedback.textContent="再記一次就會了！"}setTimeout(()=>{step=3;renderLesson()},900)}
function nextStep(){if(step<3){step++;renderLesson()}}
function prevStep(){if(step>0){step--;renderLesson()}else lessonDialog.close()}
function finishDay(){if(!completed.includes(day)){completed.push(day);completed.sort((a,b)=>a-b);localStorage.setItem("nihongoCompleted",JSON.stringify(completed))}renderDays();lessonDialog.close()}
function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="ja-JP";u.rate=.82;speechSynthesis.speak(u)}
renderDays();
</script>
</body>
</html>
